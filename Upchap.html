<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Upchap.css">
<title>Upchap</title>
</head>

<body>

<script src="auth.js"></script>
<script>
requireAdmin();
</script>

<div class="chapter-upload-page">

    <div class="chapter-upload-header">
        <h2 id="pageTitle">Thêm Chapter Mới</h2>
        <a href="Quanlytruyenchitiet.html">×</a>
    </div>

    <div class="chapter-upload-body">

        <div class="chapter-form-left">

            <div class="form-group">
                <label>Số chương: <span>*</span></label>
                <input id="chapterNumber" type="text" placeholder="Ví dụ: 1, 1.5, 2">
            </div>

            <div class="form-group">
                <label>Tên chương:</label>
                <input id="chapterTitle" type="text" placeholder="Ví dụ: Sự khởi đầu">
            </div>

            <div class="form-group">
                <label>Trạng thái: <span>*</span></label>
                <select id="chapterStatus">
                    <option value="Công khai">Công khai</option>
                    <option value="Ẩn">Ẩn</option>
                </select>
            </div>

            <div class="form-group">
                <label>Hẹn giờ đăng:</label>
                <input type="datetime-local" id="scheduleTime">
                <p>Để trống nếu đăng ngay</p>
            </div>

        </div>

        <div class="chapter-form-right">

            <label>
                <img src="Image/book-bookmark.svg" alt=""> Ảnh chapter <span>*</span>
            </label>

            <div class="upload-box" id="uploadBox">

				<input type="file"
					   id="chapterImages"
					   accept=".webp,.avif,image/webp,image/Avif"
					   multiple
					   hidden>

				<div class="upload-content" id="uploadContent">
					<div class="upload-icon">☁</div>
					<p><b>Kéo thả ảnh vào đây</b> hoặc click để chọn</p>
					<p>CHỈ ĐƯỢC UP FILE WEBP VÀ AVIF</p>

					<button type="button" class="choose-file" id="chooseFileBtn">
						⬆ Chọn file
					</button>
				</div>

				<div id="imagePreview" class="image-preview"></div>

			</div>

            <p id="uploadError" class="upload-error">Vui lòng upload ít nhất 1 ảnh!</p>

        </div>

    </div>

    <div class="chapter-upload-footer">
        <a href="Quanlytruyenchitiet.html" class="cancel-btn">Hủy</a>
        <button id="saveChapterBtn" class="save-chapter-btn">
            <img src="Image/disk.svg" alt=""> Lưu
        </button>
    </div>

</div>

<div class="footer">
    <p>Copyright &copy; by Lion Team</p>
    <p>Link: https://www.facebook.com/nhomslion</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="r2.js"></script>
<script src="Upchap.js"></script>
</body>
</html>
