<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="Admin.css">
<title>YOMOO Admin</title>
</head>

<body>
<div class="admin-layout">

    <aside class="admin-sidebar">
        <div class="admin-logo">
            <a href="CW.html">
                <img src="Image/LOGO WEB.png" alt="">
            </a>
        </div>

        <a class="active" href="Admin.html">
            <img src="Image/house-chimney.svg" alt=""> Dashboard
        </a>

        <button class="menu-toggle" id="mangaBtn">
            <img src="Image/book-bookmark.svg" alt="">
            Truyện
            <span>⌄</span>
        </button>

        <div class="submenu" id="mangaMenu">
            <a href="ThemTr.html">Thêm truyện</a>
            <a href="Danhsach.html">Danh Sách Quản Lý</a>
        </div>

        <a href="Danhsach.html" id="xoaTruyenBtn">
            <img src="Image/trash.svg" alt=""> Xóa Truyện
        </a>
    </aside>

    <main class="admin-main">

        <header class="admin-topbar">
            <div id="clock"></div>

            <div class="admin-user">
                <div class="avatar-box">
                    <img id="adminAvatar" src="Image/user.svg" alt="">
                </div>

                <div>
                    <b class="admin-name">Admin</b>
                    <p class="admin-role">Admin</p>
                </div>
            </div>
        </header>

        <section class="admin-content">
            <div class="dashboard-grid">

                <div class="quick-card">
                    <h3>Bắt đầu nhanh</h3>

                    <div class="quick-item" id="themTruyenBtn">
                        <div class="quick-icon">+</div>

                        <div class="quick-info">
                            <h4>Thêm truyện</h4>
                            <p>Tạo truyện mới để bắt đầu đăng chương.</p>
                        </div>

                        <span class="quick-arrow">›</span>
                    </div>

                    <div class="quick-item" id="danhSachBtn">
                        <div class="quick-icon">☷</div>

                        <div class="quick-info">
                            <h4>Danh sách truyện</h4>
                            <p>Quản lý truyện bạn đã tạo.</p>
                        </div>

                        <span class="quick-arrow">›</span>
                    </div>

                </div>

            </div>
        </section>

        <footer>
            <p>Copyright &copy; by Lion Team</p>
            <p>Link: &https://www.facebook.com/nhomslion</p>
        </footer>

    </main>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="Admin.js"></script>
</body>
</html>
