<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Danhsach.css">
<title>Danhsachquanly</title>
</head>

<body>

<script src="auth.js"></script>
<script>
requireAdmin();
</script>

<div class="admin-list-page">

    <div class="admin-breadcrumb">
        <a href="admin.html">Danh Sách</a>
    </div>

    <h2>Quản lý truyện</h2>
    <p id="totalManga" class="sub-text">Quản lý tất cả 0 truyện trên hệ thống</p>

    <div class="filter-box">
        <div class="search-row">
            <input id="searchInput" type="text" placeholder="Tìm kiếm truyện...">
            <button id="searchBtn">Tìm kiếm</button>
        </div>

        <div class="filter-row">
            <select id="statusFilter">
				<option value="">Tất cả hoàn thành</option>
				<option value="Đang tiến hành">Đang tiến hành</option>
				<option value="Đã hoàn thành">Đã hoàn thành</option>
			</select>

            <select id="activeFilter">
                <option value="">Tất cả trạng thái</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>

            <select id="sortSelect">
                <option value="">Mặc định</option>
                <option value="newest">Mới nhất</option>
                <option value="oldest">Cũ nhất</option>
                <option value="view">Xem nhiều</option>
                <option value="chapter">Nhiều chương</option>
                <option value="az">Tên A-Z</option>
            </select>
        </div>
    </div>

    <div class="table-box">

        <div class="table-header">
            <h3>Danh sách Truyện</h3>
            <a href="ThemTr.html" class="add-btn">+ Thêm</a>
        </div>

        <table class="manga-table">
            <thead>
                <tr>
                    <th>Hình</th>
                    <th>Tên</th>
                    <th>Tác giả</th>
                    <th>Chương</th>
                    <th>Hoàn thành</th>
                    <th>Trạng thái</th>
                    <th>Thể loại</th>
                    <th>View</th>
                    <th>Thao tác</th>
                </tr>
            </thead>

            <tbody id="mangaTableBody"></tbody>
        </table>

        <div class="table-footer">
            <span id="showingText">Showing 0 to 0 of 0 entries</span>

            <div class="pagination">
                <a href="#">Previous</a>
                <a class="active" href="#">1</a>
                <a href="#">Next</a>
            </div>
        </div>

    </div>

</div>

<footer>
    <p>Copyright &copy; by Lion Team</p>
    <p>Link: https://www.facebook.com/nhomslion</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="r2.js"></script>
<script src="Danhsach.js"></script>
</body>
</html>
