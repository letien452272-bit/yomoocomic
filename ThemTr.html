<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ThemTr.css">
<title>ThemTr</title>
</head>

<body>

<script src="auth.js"></script>
<script>
requireAdmin();
</script>

<form id="mangaForm" class="manga-form">

    <div class="form-left">

        <h2>Thông tin truyện</h2>

        <div class="form-grid">

            <div class="form-group">
                <label>Tên truyện *</label>
                <input id="title" type="text" placeholder="Nhập tên truyện...">
            </div>

            <div class="form-group">
                <label>Tên gốc</label>
                <input id="originalName" type="text" placeholder="Tên tiếng Nhật/Trung...">
            </div>

            <div class="form-group">
                <label>Tác giả</label>
                <input id="author" type="text" placeholder="Tên tác giả...">
            </div>

            <div class="form-group">
                <label>Năm phát hành</label>
                <input id="year" type="number" value="2026">
            </div>

            <div class="form-group">
                <label>Nhóm dịch</label>
                <input id="team" type="text" value="Lion Team">
            </div>

            <div class="form-group">
                <label>Chapter mới nhất</label>
                <input id="chapter" type="text" placeholder="VD: Chapter 100">
            </div>

        </div>

        <div class="form-group full">
            <label>Mô tả</label>
            <textarea id="description" rows="8"></textarea>
        </div>

        <div class="form-group full">
            <label>Thể loại</label>

            <div class="genre-list">
                <label><input type="checkbox" name="genre" value="Huyền Huyễn"> Huyền Huyễn</label>
                <label><input type="checkbox" name="genre" value="Xuyên Không"> Xuyên Không</label>
                <label><input type="checkbox" name="genre" value="Trọng Sinh"> Trọng Sinh</label>
                <label><input type="checkbox" name="genre" value="Trinh Thám"> Trinh Thám</label>
                <label><input type="checkbox" name="genre" value="Cổ Đại"> Cổ Đại</label>
                <label><input type="checkbox" name="genre" value="Chuyển Sinh"> Chuyển Sinh</label>
                <label><input type="checkbox" name="genre" value="Manhwa"> Manhwa</label>
                <label><input type="checkbox" name="genre" value="Romance"> Romance</label>
                <label><input type="checkbox" name="genre" value="School Life"> School Life</label>
                <label><input type="checkbox" name="genre" value="Action"> Action</label>
                <label><input type="checkbox" name="genre" value="Fantasy"> Fantasy</label>
                <label><input type="checkbox" name="genre" value="Isekai"> Isekai</label>
                <label><input type="checkbox" name="genre" value="Horror"> Horror</label>
                <label><input type="checkbox" name="genre" value="Webtoon"> Webtoon</label>
                <label><input type="checkbox" name="genre" value="Josei"> Josei</label>
                <label><input type="checkbox" name="genre" value="Adult"> Adult</label>
                <label><input type="checkbox" name="genre" value="Mature"> Mature</label>
                <label><input type="checkbox" name="genre" value="Smut"> Smut</label>
            </div>

        </div>

    </div>

    <div class="form-right">

        <div class="admin-box">

            <h3>Hoàn Thành</h3>

            <button type="submit" class="save-btn">Lưu</button>
            <button type="button" id="saveExitBtn" class="save-btn">Lưu & Thoát</button>

        </div>

        <div class="admin-box">

            <h3>Ảnh bìa truyện</h3>

            <input id="cover" type="file" accept="image/*">

            <div class="cover-preview-box">
                <img id="coverPreview" src="" alt="Ảnh bìa">
                <p id="coverText">Chưa chọn ảnh</p>
            </div>

        </div>

        <div class="admin-box">

            <h3>Trạng thái</h3>

            <label>Trạng thái</label>

            <select id="status">
                <option>Đang tiến hành</option>
                <option>Đã hoàn thành</option>
            </select>

        </div>

    </div>

</form>

<footer>
    <p>Copyright &copy; by Lion Team</p>
    <p>Link: https://www.facebook.com/nhomslion</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="r2.js"></script>
<script src="ThemTr.js"></script>
</body>
</html>
